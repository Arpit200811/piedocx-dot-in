  <script>
    // Build Failure/Asset Change Recovery Script
    window.addEventListener('error', function (e) {
      if (e.target && e.target.tagName === 'SCRIPT' || e.message && e.message.includes('MIME type')) {
        const lastReload = localStorage.getItem('last-build-reload');
        const now = Date.now();
        // Limit reloads to once every 10 seconds to prevent infinite loops
        if (!lastReload || (now - parseInt(lastReload)) > 10000) {
          localStorage.setItem('last-build-reload', now);
          console.warn('Asset load failure (MIME mismatch). Force-refreshing build...');
          // Force refresh bypassing cache
          window.location.reload(true);
        }
      }
    }, true);
  </script>
